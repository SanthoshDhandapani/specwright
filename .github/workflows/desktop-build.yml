name: Desktop Build

# Trigger manually or via tag like "desktop-v0.1.0"
# Does NOT trigger on branch pushes or PRs.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mac
          - windows
  push:
    tags:
      - "desktop-v*"

jobs:
  build-mac:
    name: Build (mac)
    runs-on: macos-latest
    if: >
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'mac'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @specwright/agent-runner build

      - name: Build desktop distributables
        run: pnpm --filter @specwright/desktop dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specwright-mac
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          retention-days: 30

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    if: >
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'windows'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @specwright/agent-runner build

      - name: Build desktop distributables
        run: pnpm --filter @specwright/desktop dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specwright-windows
          path: |
            apps/desktop/dist/*.exe
          retention-days: 30
