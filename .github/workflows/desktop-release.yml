name: Desktop Release

# Triggered by pushing a tag like "desktop-v0.1.0", or manually via workflow_dispatch
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.2)"
        required: true
        default: "0.1.0"
      release_notes:
        description: "Release notes (optional — leave blank to auto-generate from commits)"
        required: false
        default: ""

jobs:
  bump-version:
    name: Bump version & commit
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump package.json version
        run: |
          cd apps/desktop
          npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/package.json
          git commit -m "chore: bump desktop version to ${{ github.event.inputs.version }}" || echo "Nothing to commit"
          git push

  build:
    name: Build (${{ matrix.platform }})
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            dist_cmd: pnpm --filter @specwright/desktop dist:mac
            artifacts: |
              apps/desktop/dist/*.dmg
              apps/desktop/dist/*.zip
              apps/desktop/dist/latest-mac.yml
          - os: windows-latest
            platform: windows
            dist_cmd: pnpm --filter @specwright/desktop dist:win
            artifacts: |
              apps/desktop/dist/*.exe
              apps/desktop/dist/latest.yml
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent-runner
        run: pnpm --filter @specwright/agent-runner build

      - name: Build distributables
        run: ${{ matrix.dist_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specwright-${{ matrix.platform }}
          path: ${{ matrix.artifacts }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Create release (with custom notes)
        if: github.event.inputs.release_notes != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-v{0}', github.event.inputs.version) }}
          name: "Specwright Desktop ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-v{0}', github.event.inputs.version) }}"
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.event.inputs.version, '-beta') || contains(github.ref_name, '-alpha') || contains(github.event.inputs.version, '-alpha') }}
          files: release-artifacts/**/*
          body: |
            ${{ github.event.inputs.release_notes }}

            ## Installation

            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | `Specwright-${{ github.event.inputs.version }}-mac-arm64.dmg` |
            | macOS (Intel) | `Specwright-${{ github.event.inputs.version }}-mac-x64.dmg` |
            | Windows | `Specwright-${{ github.event.inputs.version }}-win-x64.exe` |

            > **macOS:** Open the DMG, drag Specwright to Applications.
            > **Windows:** Run the installer — the app will auto-launch when done.

      - name: Create release (auto-generated notes)
        if: github.event.inputs.release_notes == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-v{0}', github.event.inputs.version) }}
          name: "Specwright Desktop ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-v{0}', github.event.inputs.version) }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.event.inputs.version, '-beta') || contains(github.ref_name, '-alpha') || contains(github.event.inputs.version, '-alpha') }}
          files: release-artifacts/**/*
          body: |
            ## Installation

            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | `Specwright-${{ github.event.inputs.version }}-mac-arm64.dmg` |
            | macOS (Intel) | `Specwright-${{ github.event.inputs.version }}-mac-x64.dmg` |
            | Windows | `Specwright-${{ github.event.inputs.version }}-win-x64.exe` |

            > **macOS:** Open the DMG, drag Specwright to Applications.
            > **Windows:** Run the installer — the app will auto-launch when done.
