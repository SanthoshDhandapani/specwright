appId: com.specwright.desktop
productName: Specwright
copyright: Copyright (c) 2026 Specwright

# Provides repo info for auto-update config. Actual publishing is handled by
# softprops/action-gh-release — electron-builder uses --publish never in CI.
publish:
  provider: github
  owner: SanthoshDhandapani
  repo: specwright

# electron-vite outputs to out/
directories:
  buildResources: build
  output: dist

# Include the compiled app from electron-vite
files:
  - out/**/*
  - "!out/tsconfig.node.tsbuildinfo"
  - package.json
  - node_modules/**/*

# Unpack @playwright/mcp and its deps from asar so Node can execute cli.js directly.
# Files inside app.asar cannot be spawned as child processes.
# playwright-core and playwright are required by @playwright/mcp at runtime.
asarUnpack:
  - node_modules/@playwright/mcp/**/*
  - node_modules/playwright-core/**/*
  - node_modules/playwright/**/*

# beforePack downloads the uv binary for the current platform into bin/.
# extraResources then copies whichever binary exists into the packaged app.
# Users never need to install uv or Python manually.
beforePack: ./build/downloadUv.js

extraResources:
  - from: src/main/resources
    to: resources
  - from: bin/uv
    to: bin/uv
  - from: bin/uvx
    to: bin/uvx
  - from: bin/uv.exe
    to: bin/uv.exe
  - from: bin/uvx.exe
    to: bin/uvx.exe

# macOS
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - nsis
    - portable
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

# Linux
linux:
  target:
    - AppImage
  category: Development
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
